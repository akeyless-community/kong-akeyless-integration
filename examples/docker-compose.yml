# Kong Gateway + PostgreSQL demo for the Akeyless vault backend.
#
# Prerequisites:
#   - Kong Gateway Enterprise license (export KONG_LICENSE_DATA)
#   - Akeyless credentials (see .env.example)
#   - kong-vault-akeyless rock installed in the gateway image OR strategy
#     files mounted into /usr/local/share/lua/5.1/kong/vaults/akeyless/
#
# Quick start:
#   cp .env.example .env   # fill in credentials
#   docker compose up -d
#   ./scripts/validate-vault.sh

services:
  kong-database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - kong-db:/var/lib/postgresql/data

  kong-migrations:
    image: kong/kong-gateway:3.9
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_LICENSE_DATA: ${KONG_LICENSE_DATA:?Set KONG_LICENSE_DATA in .env}
    restart: on-failure

  kong-gateway:
    image: kong/kong-gateway:3.9
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_LICENSE_DATA: ${KONG_LICENSE_DATA}
    volumes:
      - ../vault-strategy/kong/vaults/akeyless:/usr/local/share/lua/5.1/kong/vaults/akeyless:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  kong-db:
