_format_version: "3.0"

vaults:
  - name: akeyless
    prefix: akeyless-vault
    description: Storing secrets in Akeyless Secrets Manager
    config:
      gateway_url: "${{ env "AKEYLESS_GATEWAY_URL" }}"
      auth_method: api_key
      access_id: "${{ env "AKEYLESS_ACCESS_ID" }}"
      access_key: "${{ env "AKEYLESS_ACCESS_KEY" }}"
      path_prefix: "${{ env "AKEYLESS_PATH_PREFIX" }}"
      ttl: 60
      neg_ttl: 10
      resurrect_ttl: 30

# Example: secret at /demo/dotnet-integration/kong with path_prefix /demo
#   {vault://akeyless-vault/dotnet-integration/kong}

services:
  - name: demo-upstream
    url: https://httpbin.org
    routes:
      - name: demo-route
        paths:
          - /demo

plugins:
  - name: key-auth
    service: demo-upstream
    config:
      key_names:
        - apikey
      # Store the API key in Akeyless at /kong/demo/api-key, then reference:
      hide_credentials: true

# Uncomment after creating the secret in Akeyless and configuring the vault:
#      key: "{vault://akeyless-vault/demo/api-key}"
